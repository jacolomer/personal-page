# Netlify configuration for Quarto website
# The site is pre-rendered locally with `quarto render`
# and the _site/ folder is committed to the repository.
# Netlify simply serves the static output — no build step needed.

[build]
  publish = "_site"

# Redirect rules (optional, for clean URLs)
[[redirects]]
  from = "/publications"
  to = "/publications.html"
  status = 200

[[redirects]]
  from = "/cv"
  to = "/cv.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200
